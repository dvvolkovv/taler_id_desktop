name: taler_id_mobile
description: Taler ID — мобильное приложение для iOS и Android
publish_to: 'none'
version: 1.0.9+73

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.3

  # Utilities
  collection: ^1.18.0

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometrics
  local_auth: ^2.3.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5

  # DI
  get_it: ^8.0.3

  # Code generation models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # KYC / Sumsub
  flutter_idensic_mobile_sdk_plugin: ^1.40.2

  # Deep links
  app_links: ^6.3.4

  # Cache
  hive_flutter: ^1.1.0

  # Crypto
  crypto: ^3.0.6

  # Chat assistant
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  flutter_markdown: ^0.7.7

  # WebRTC for realtime assistant
  flutter_webrtc: ^0.12.6

  # Real-time voice calls via LiveKit
  livekit_client: ^2.3.0

  # Real-time messenger via Socket.io
  socket_io_client: ^2.0.3+1

  # Keep screen on
  wakelock_plus: ^1.2.8

  # Native incoming call UI (like a real phone call)
  flutter_callkit_incoming: ^2.0.2

  # File picking and URL launching
  file_picker: ^8.1.2
  url_launcher: ^6.3.1

  # Audio recording and playback (voice messages)
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.5

  # Local notifications (show FCM messages while app is in foreground)
  flutter_local_notifications: ^18.0.1

  # Typography
  google_fonts: ^6.2.1

  # Video
  video_player: ^2.9.2

  # Permissions
  permission_handler: ^11.3.1

  # Share
  share_plus: ^10.1.4

  # Utils
  intl: any
  package_info_plus: ^8.1.3

dependency_overrides:
  path_provider_foundation: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon_1024.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#167EF2"
  adaptive_icon_foreground: "app_icon_1024.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audio/ringback.wav
    - assets/video.mp4
    - app_icon_1024.png
