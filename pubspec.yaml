name: taler_id_mobile
description: Taler ID — мобильное приложение для iOS и Android
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.3

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometrics
  local_auth: ^2.3.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5

  # DI
  get_it: ^8.0.3

  # Code generation models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # KYC / Sumsub
  flutter_idensic_mobile_sdk_plugin: ^1.40.2

  # Deep links
  app_links: ^6.3.4

  # Cache
  hive_flutter: ^1.1.0

  # Crypto
  crypto: ^3.0.6

  # Utils
  intl: any
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon_1024.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
